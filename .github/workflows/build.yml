name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.22.0'

    - name: Build
      run: |
        mkdir /tmp/code
        cp -r lib /tmp/code/
        cp -r assets /tmp/code/ 2>/dev/null || true
        cp pubspec.yaml /tmp/code/
        
        rm -rf android ios
        
        flutter create --org com.flexyemen --project-name flex_yemen --platforms android .
        
        rm -rf lib assets
        cp -r /tmp/code/lib .
        cp -r /tmp/code/assets . 2>/dev/null || true
        cp /tmp/code/pubspec.yaml .
        
        mkdir -p assets/images assets/icons assets/fonts
        
        # إضافة flutterEmbedding
        sed -i '/<application>/a \        <meta-data android:name="flutterEmbedding" android:value="2" />' android/app/src/main/AndroidManifest.xml
        
        # فرض Kotlin 1.7.1 و Gradle 7.6.3
        cat > android/build.gradle << 'GRADLE'
        buildscript {
            ext.kotlin_version = '1.7.1'
            repositories {
                google()
                mavenCentral()
            }
            dependencies {
                classpath 'com.android.tools.build:gradle:7.6.3'
                classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
            }
        }
        allprojects {
            repositories {
                google()
                mavenCentral()
            }
        }
        rootProject.buildDir = '../build'
        subprojects {
            project.buildDir = "${rootProject.buildDir}/${project.name}"
        }
        subprojects {
            project.evaluationDependsOn(':app')
        }
        tasks.register("clean", Delete) {
            delete rootProject.buildDir
        }
        GRADLE
        
        echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-7.6.3-all.zip" > android/gradle/wrapper/gradle-wrapper.properties
        
        # تنظيف cache
        rm -rf ~/.gradle/caches/
        
        flutter pub get
        flutter build apk --release --split-per-abi

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: build/app/outputs/flutter-apk/*.apk

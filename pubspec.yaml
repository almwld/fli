name: flex_yemen
description: A professional e-commerce platform for Yemen.
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  flutter_animate: ^4.5.0
  carousel_slider: ^5.0.0
  shimmer: ^3.0.0
  provider: ^6.1.1
  supabase_flutter: ^2.5.0
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  intl: ^0.18.1
  url_launcher: ^6.2.5
  share_plus: ^9.0.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/animations/
  fonts:
    - family: Changa
      fonts:
          weight: 600
